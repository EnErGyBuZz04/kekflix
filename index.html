<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Kekflix — Guarda film e serie TV in streaming con un'interfaccia elegante stile Netflix." />
  <title>KEKFLIX — Film e Serie TV in Streaming</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#E50914" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Kekflix" />
  <link rel="apple-touch-icon" href="/icons/icon-512.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="msapplication-TileColor" content="#141414" />
  <meta name="screen-orientation" content="landscape" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="/style.css" />
  <link rel="icon" type="image/png" href="/icons/icon-512.png" />
</head>
  <!-- Profile Selection Screen -->
  <div id="profile-screen">
    <!-- Populated by profile.js -->
  </div>

  <!-- App Container (hidden until authenticated) -->
  <div id="app-container" class="hidden">
    <!-- Navbar -->
    <nav class="navbar" id="navbar">
      <div class="navbar-inner">
        <a href="#" class="navbar-brand" id="nav-brand">KEKFLIX</a>
        <div class="navbar-nav" id="nav-links">
          <a href="#" class="active" data-page="home" id="nav-home">Home</a>
          <a href="#" data-page="movies" id="nav-movies">Film</a>
          <a href="#" data-page="tv" id="nav-tv">Serie TV</a>
        </div>
        <div class="nav-search" id="nav-search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Titoli, persone, generi" autocomplete="off" />
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="app">
      <!-- Hero Section -->
      <section class="hero" id="hero-section">
        <div class="hero-backdrop" id="hero-backdrop"></div>
        <div class="hero-gradient-side"></div>
        <div class="hero-content" id="hero-content">
          <!-- Populated by JS -->
        </div>
      </section>

      <!-- Content Rows -->
      <div id="content-rows">
        <!-- Populated by JS -->
      </div>
    </main>

    <!-- Search Overlay -->
    <div class="search-overlay" id="search-overlay">
      <h2 class="search-title" id="search-title"></h2>
      <div class="search-grid" id="search-grid">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Movie/Show Detail Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modal-close" aria-label="Chiudi">✕</button>
        <div class="modal-backdrop-wrap" id="modal-backdrop-wrap">
          <!-- Backdrop image -->
        </div>
        <div class="modal-body" id="modal-body">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <p>KEKFLIX — Progetto personale, non commerciale.</p>
      <p>Dati forniti da <a href="https://www.themoviedb.org/" target="_blank" rel="noopener">TMDB</a>. Questo prodotto utilizza l'API di TMDB ma non è approvato o certificato da TMDB.</p>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
